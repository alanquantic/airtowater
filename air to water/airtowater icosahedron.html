<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>airtowater.mx — Icosaedro · refinamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ocean: #1d3a5f;
    --deep: #0e2238;
    --mist: #a9c4d4;
    --mint: #4a8c7a;
    --water: #3a6a8a;
    --gold: #b8954a;
    --silver: #c9cdd2;
    --paper: #f5f1e8;
    --paper-cool: #eef2f5;
  }
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'JetBrains Mono', monospace; }
  .card { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; box-sizing: border-box; position: relative; }
  .label-meta {
    position: absolute; bottom: 10px; left: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.5;
  }
  .legend { font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7; color: #1d3a5f; padding: 28px; }
  .legend h3 { font-family: 'Marcellus', serif; font-weight: 400; font-size: 22px; margin: 0 0 14px; letter-spacing: 0.04em; }
  .legend p { margin: 0 0 12px; opacity: 0.78; }
  .legend .row { display: flex; gap: 10px; align-items: center; margin: 4px 0; }
  .swatch { width: 14px; height: 14px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.08); }
  .num { color: #b8954a; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icosahedron-marks.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { IcoPrimary, IcoSpiral, IcoFilled, IcoDrop, IcoSeal } = window;
  const { TweaksPanel, TweakSection, TweakSlider, TweakColor, useTweaks } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "lineWeight": 1.8,
    "strokeColor": "#1d3a5f",
    "innerColor": "#3a6a8a",
    "accentColor": "#b8954a"
  }/*EDITMODE-END*/;

  const PAPER = "#f5f1e8";
  const PAPER_COOL = "#eef2f5";
  const DEEP = "#0e2238";
  const OCEAN = "#1d3a5f";
  const MIST = "#a9c4d4";
  const WATER = "#3a6a8a";
  const MINT = "#4a8c7a";
  const GOLD = "#b8954a";
  const SILVER = "#c9cdd2";

  // ----- Wordmark for airtowater.mx -----
  const Wordmark = ({ color = OCEAN, accent = GOLD, size = 40 }) => (
    <div style={{ display: "inline-flex", alignItems: "baseline", fontFamily: "Marcellus, serif", color, fontSize: size, letterSpacing: "0.04em", lineHeight: 1 }}>
      <span>airtowater</span>
      <span style={{ color: accent, fontSize: size * 0.55, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.12em", marginLeft: 4 }}>.mx</span>
    </div>
  );

  const Tagline = ({ color = OCEAN, opacity = 0.55 }) => (
    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: "0.32em", color, opacity, textTransform: "uppercase" }}>
      agua del aire · sacred geometry
    </div>
  );

  const Numerology = ({ color = GOLD }) => (
    <div style={{ display: "flex", gap: 10, fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: "0.28em", color }}>
      <span>137</span><span>·</span><span>432</span><span>·</span><span>9</span>
    </div>
  );

  const Meta = ({ children }) => <div className="label-meta">{children}</div>;

  // Wrapped IcoPrimary that respects the global line-weight tweak
  const makeTweakedMarks = (mult) => ({
    P: (p) => <IcoPrimary {...p} sw={(p.sw ?? 2.4) * mult} />,
    S: (p) => <IcoSpiral {...p} sw={(p.sw ?? 2.2) * mult} />,
    F: (p) => <IcoFilled {...p} />,
    D: (p) => <IcoDrop {...p} sw={(p.sw ?? 2.2) * mult} />,
    Seal: (p) => <IcoSeal {...p} sw={(p.sw ?? 1.6) * mult} />,
  });

  function App() {
    const [t, setT] = useTweaks(TWEAK_DEFAULTS);
    const M = makeTweakedMarks(t.lineWeight);
    return (
      <React.Fragment>
      <TweaksPanel title="Tweaks · icosaedro">
        <TweakSection title="Geometría">
          <TweakSlider label="Grosor de línea" value={t.lineWeight} onChange={v => setT('lineWeight', v)} min={0.5} max={3} step={0.05} suffix="×" />
        </TweakSection>
        <TweakSection title="Color">
          <TweakColor label="Trazo principal" value={t.strokeColor} onChange={v => setT('strokeColor', v)} options={["#1d3a5f","#0e2238","#3a6a8a","#4a8c7a","#b8954a"]} />
          <TweakColor label="Trazo interior" value={t.innerColor} onChange={v => setT('innerColor', v)} options={["#3a6a8a","#4a8c7a","#a9c4d4","#1d3a5f","#b8954a"]} />
          <TweakColor label="Acento (vértice)" value={t.accentColor} onChange={v => setT('accentColor', v)} options={["#b8954a","#c9cdd2","#1d3a5f","#4a8c7a","#f5f1e8"]} />
        </TweakSection>
      </TweaksPanel>
      <DesignCanvas title="airtowater.mx — icosaedro" subtitle="Dirección elegida: refinamiento del icosaedro (Platonic water solid)">

        {/* ---------- INTRO ---------- */}
        <DCSection id="why" title="Por qué el icosaedro">
          <DCArtboard id="rationale" label="Concepto" width={620} height={460}>
            <div className="legend">
              <h3>El sólido del agua</h3>
              <p>En la cosmología platónica, el <strong style={{fontWeight:500}}>icosaedro</strong> — <span className="num">20</span> caras triangulares, <span className="num">12</span> vértices, <span className="num">30</span> aristas — es el sólido asociado al elemento agua.</p>
              <p>Visto desde un vértice, el icosaedro se proyecta como dos pentágonos concéntricos en proporción áurea <span className="num">1/φ</span>. Esta es la vista más reveladora de su geometría sagrada.</p>
              <p style={{ marginTop: 16, fontSize: 10, opacity: 0.65 }}>· proporción pentagonal en <span className="num">φ</span> = 1.618</p>
              <p style={{ fontSize: 10, opacity: 0.65 }}>· <span className="num">9</span> marcas áureas en el sello exterior</p>
              <p style={{ fontSize: 10, opacity: 0.65 }}>· ángulo dorado <span className="num">137.5°</span> entre marcas</p>
              <p style={{ fontSize: 10, opacity: 0.65 }}>· numerología <span className="num">137 · 432 · 9</span> integrada en el sistema</p>
            </div>
          </DCArtboard>
        </DCSection>

        {/* ---------- MARK VARIATIONS ---------- */}
        <DCSection id="marks" title="Variantes del símbolo">

          <DCArtboard id="m-primary" label="A — Primary (línea)" width={360} height={360}>
            <div className="card" style={{background:PAPER}}>
              <M.P size={260} stroke={t.strokeColor} inner={t.innerColor} accent={t.accentColor} />
              <Meta>recomendada</Meta>
            </div>
          </DCArtboard>

          <DCArtboard id="m-spiral" label="B — Con espiral φ" width={360} height={360}>
            <div className="card" style={{background:PAPER_COOL}}>
              <M.S size={260} stroke={t.strokeColor} inner={t.innerColor} spiral={MIST} accent={t.accentColor} />
              <Meta>aire → agua</Meta>
            </div>
          </DCArtboard>

          <DCArtboard id="m-seal" label="C — Sello (anillo + ticks)" width={360} height={360}>
            <div className="card" style={{background:PAPER}}>
              <M.Seal size={260} stroke={t.strokeColor} inner={t.innerColor} accent={t.accentColor} />
              <Meta>9 marcas áureas</Meta>
            </div>
          </DCArtboard>

          <DCArtboard id="m-filled" label="D — Sólido facetado" width={360} height={360}>
            <div className="card" style={{background:PAPER}}>
              <M.F size={260} stroke={DEEP} lightTone="#e8f0f5" midTone={MIST} accent={GOLD} />
              <Meta>volumétrico</Meta>
            </div>
          </DCArtboard>

          <DCArtboard id="m-drop" label="E — En gota" width={360} height={360}>
            <div className="card" style={{background:PAPER}}>
              <M.D size={260} stroke={t.strokeColor} inner={t.innerColor} accent={t.accentColor} />
              <Meta>silueta de agua</Meta>
            </div>
          </DCArtboard>

          <DCArtboard id="m-reverse" label="F — Reverse / fondo profundo" width={360} height={360}>
            <div className="card" style={{background:DEEP}}>
              <M.P size={260} stroke={PAPER} inner={MIST} accent={t.accentColor} />
              <Meta style={{color:'#fff'}}>oro sobre añil</Meta>
            </div>
          </DCArtboard>

        </DCSection>

        {/* ---------- SCALE TEST ---------- */}
        <DCSection id="scale" title="Pruebas de escala">
          <DCArtboard id="scale-row" label="De favicon a póster" width={840} height={260}>
            <div className="card" style={{background:PAPER, gap: 40, justifyContent: 'space-evenly'}}>
              <M.P size={24} stroke={OCEAN} inner={WATER} accent={GOLD} sw={3} />
              <M.P size={48} stroke={OCEAN} inner={WATER} accent={GOLD} sw={2.6} />
              <M.P size={96} stroke={OCEAN} inner={WATER} accent={GOLD} sw={2.4} />
              <M.P size={160} stroke={OCEAN} inner={WATER} accent={GOLD} sw={2.2} />
              <M.P size={200} stroke={OCEAN} inner={WATER} accent={GOLD} sw={2.1} />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ---------- LOCKUPS ---------- */}
        <DCSection id="lockups" title="Lockups con tipografía">

          <DCArtboard id="lock-h-light" label="Horizontal · papel" width={680} height={220}>
            <div className="card" style={{background:PAPER, gap: 32}}>
              <M.P size={140} stroke={OCEAN} inner={WATER} accent={GOLD} />
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <Wordmark color={OCEAN} accent={GOLD} size={48} />
                <Tagline color={OCEAN} />
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="lock-h-deep" label="Horizontal · profundo" width={680} height={220}>
            <div className="card" style={{background:DEEP, gap: 32}}>
              <M.P size={140} stroke={PAPER} inner={MIST} accent={GOLD} />
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <Wordmark color={PAPER} accent={GOLD} size={48} />
                <Tagline color={PAPER} opacity={0.5} />
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="lock-stacked" label="Apilado · numerología" width={420} height={420}>
            <div className="card" style={{background:PAPER, flexDirection: 'column', gap: 20}}>
              <M.P size={180} stroke={OCEAN} inner={WATER} accent={GOLD} />
              <Wordmark color={OCEAN} accent={GOLD} size={36} />
              <div style={{marginTop:-6}}><Numerology color={GOLD} /></div>
              <Tagline color={OCEAN} />
            </div>
          </DCArtboard>

          <DCArtboard id="lock-stacked-deep" label="Apilado · profundo" width={420} height={420}>
            <div className="card" style={{background:DEEP, flexDirection: 'column', gap: 20}}>
              <M.P size={180} stroke={PAPER} inner={MIST} accent={GOLD} />
              <Wordmark color={PAPER} accent={GOLD} size={36} />
              <div style={{marginTop:-6}}><Numerology color={GOLD} /></div>
              <Tagline color={PAPER} opacity={0.5} />
            </div>
          </DCArtboard>

          <DCArtboard id="lock-seal-stacked" label="Apilado · sello" width={420} height={420}>
            <div className="card" style={{background:PAPER_COOL, flexDirection: 'column', gap: 20}}>
              <M.Seal size={200} stroke={OCEAN} inner={WATER} accent={GOLD} />
              <Wordmark color={OCEAN} accent={GOLD} size={32} />
              <Tagline color={OCEAN} />
            </div>
          </DCArtboard>

        </DCSection>

        {/* ---------- COLOR TREATMENTS ---------- */}
        <DCSection id="treatments" title="Tratamientos cromáticos">

          <DCArtboard id="t-classic" label="Clásico · azul + oro" width={320} height={320}>
            <div className="card" style={{background:PAPER}}>
              <M.P size={220} stroke={OCEAN} inner={WATER} accent={GOLD} />
            </div>
          </DCArtboard>

          <DCArtboard id="t-mint" label="Verde menta · armonía" width={320} height={320}>
            <div className="card" style={{background:PAPER}}>
              <M.P size={220} stroke={OCEAN} inner={MINT} accent={GOLD} />
            </div>
          </DCArtboard>

          <DCArtboard id="t-gold-deep" label="Oro sobre añil" width={320} height={320}>
            <div className="card" style={{background:DEEP}}>
              <M.P size={220} stroke={GOLD} inner="rgba(184,149,74,0.55)" accent={PAPER} />
            </div>
          </DCArtboard>

          <DCArtboard id="t-silver-deep" label="Plata sobre añil" width={320} height={320}>
            <div className="card" style={{background:DEEP}}>
              <M.P size={220} stroke={SILVER} inner="rgba(201,205,210,0.5)" accent={GOLD} />
            </div>
          </DCArtboard>

          <DCArtboard id="t-mono-blue" label="Mono · tinta de un color" width={320} height={320}>
            <div className="card" style={{background:PAPER_COOL}}>
              <M.P size={220} stroke={OCEAN} inner={OCEAN} accent={OCEAN} />
            </div>
          </DCArtboard>

          <DCArtboard id="t-mono-white" label="Mono · blanco" width={320} height={320}>
            <div className="card" style={{background:OCEAN}}>
              <M.P size={220} stroke="#ffffff" inner="rgba(255,255,255,0.7)" accent="#ffffff" />
            </div>
          </DCArtboard>

        </DCSection>

        {/* ---------- APPLICATIONS ---------- */}
        <DCSection id="apps" title="Aplicaciones">

          <DCArtboard id="bottle" label="Etiqueta de botella" width={320} height={520}>
            <div style={{ width: "100%", height: "100%", background: DEEP, padding: 30, boxSizing: "border-box", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8.5, letterSpacing: "0.4em", color: GOLD, textTransform: "uppercase" }}>agua del aire</div>
              <M.P size={200} stroke={GOLD} inner="rgba(184,149,74,0.55)" accent={PAPER} />
              <div style={{ textAlign: "center", display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
                <Wordmark color={PAPER} accent={GOLD} size={22} />
                <Numerology color={GOLD} />
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, letterSpacing: "0.3em", color: PAPER, opacity: 0.55, marginTop: 6, textTransform: "uppercase" }}>
                  500 ml · ph 7.4 · méxico
                </div>
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="card-front" label="Tarjeta — frente" width={520} height={300}>
            <div style={{ width: "100%", height: "100%", background: PAPER, padding: 32, boxSizing: "border-box", display: "flex", flexDirection: "column", justifyContent: "space-between", position:'relative' }}>
              <M.P size={88} stroke={OCEAN} inner={WATER} accent={GOLD} />
              <div>
                <Wordmark color={OCEAN} accent={GOLD} size={26} />
                <div style={{marginTop:8}}><Tagline color={OCEAN} /></div>
              </div>
              <div style={{ position: "absolute", top: 32, right: 32, fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: "0.2em", color: GOLD, textAlign: "right", lineHeight: 1.9 }}>
                137<br/>432<br/>9
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="card-back" label="Tarjeta — reverso" width={520} height={300}>
            <div style={{ width: "100%", height: "100%", background: DEEP, padding: 32, boxSizing: "border-box", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display:'flex', flexDirection:'column', gap:10, color: PAPER }}>
                <div style={{ fontFamily: "'Marcellus', serif", fontSize: 14, letterSpacing: '0.05em' }}>Mariana Ríos</div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: '0.2em', opacity: 0.55, textTransform: 'uppercase' }}>fundadora · alquimista</div>
                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: '0.15em', opacity: 0.7, marginTop: 14 }}>
                  hola@airtowater.mx<br/>+52 55 1234 5678
                </div>
              </div>
              <M.P size={120} stroke={GOLD} inner="rgba(184,149,74,0.5)" accent={PAPER} />
            </div>
          </DCArtboard>

          <DCArtboard id="avatar" label="Social · avatar circular" width={300} height={300}>
            <div className="card" style={{background:PAPER_COOL}}>
              <div style={{ width: 220, height: 220, borderRadius: 110, background: DEEP, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 8px 30px rgba(14,34,56,0.25)" }}>
                <M.P size={170} stroke={GOLD} inner="rgba(184,149,74,0.55)" accent={PAPER} />
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="favicons" label="Favicons" width={520} height={220}>
            <div className="card" style={{background:PAPER, gap: 26, justifyContent:'center'}}>
              <div style={{ width: 16, height: 16, background: DEEP, borderRadius: 3, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <M.P size={12} stroke={GOLD} inner={GOLD} accent={GOLD} sw={3.4} />
              </div>
              <div style={{ width: 32, height: 32, background: DEEP, borderRadius: 5, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <M.P size={26} stroke={GOLD} inner={GOLD} accent={GOLD} sw={2.6} />
              </div>
              <div style={{ width: 64, height: 64, background: DEEP, borderRadius: 10, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <M.P size={54} stroke={GOLD} inner="rgba(184,149,74,0.6)" accent={PAPER} sw={2.2} />
              </div>
              <div style={{ width: 128, height: 128, background: DEEP, borderRadius: 22, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <M.P size={108} stroke={GOLD} inner="rgba(184,149,74,0.55)" accent={PAPER} sw={2} />
              </div>
            </div>
          </DCArtboard>

          <DCArtboard id="poster" label="Póster / wallpaper" width={420} height={560}>
            <div style={{ width: "100%", height: "100%", background: DEEP, padding: 40, boxSizing: "border-box", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "space-between", position:'relative', overflow:'hidden' }}>
              <div style={{ position:'absolute', inset: 14, border: `1px solid ${GOLD}`, opacity: 0.4, pointerEvents:'none' }} />
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, letterSpacing: "0.4em", color: GOLD, textTransform: "uppercase" }}>elemento · agua</div>
              <M.Seal size={300} stroke={GOLD} inner="rgba(184,149,74,0.5)" accent={PAPER} sw={1.8} />
              <div style={{ textAlign:'center', display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
                <Wordmark color={PAPER} accent={GOLD} size={30} />
                <Numerology color={GOLD} />
              </div>
            </div>
          </DCArtboard>

        </DCSection>

      </DesignCanvas>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
